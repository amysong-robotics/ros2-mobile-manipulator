ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # --- 轮式里程计 (修正：变量名必须加数字 0) ---
    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false

    # --- IMU (修正：变量名必须加数字 0) ---
    imu0: /imu
    # 使用绝对朝向(yaw)和角速度(vyaw)
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_nodelay: true
    imu0_differential: false
   
    # 【CRITICAL FIX】改为 true，解决初始朝向对不齐导致地图漂移的问题
    imu0_relative: true 
    
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
